<style>
  :root{
    --bg:#F7F4EC; --panel:#FFFFFF; --ink:#1C2B28; --ink-soft:#5B6B66;
    --teal:#0F4C44; --teal-soft:#3D7068; --gold:#C9A227; --blue:#3B6E8F;
    --rose:#B45A4A; --amber:#D98C2B; --line:#E4DFD0;
    --good:#3D7A53; --warn:#D98C2B; --bad:#B45A4A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Vazirmatn','Segoe UI','Tahoma','Arial',sans-serif;
    min-height:100vh; width:100%;
  }
  ::-webkit-scrollbar{height:6px;width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;}

  .wrap{max-width:1280px;margin:0 auto;padding:0 20px;}
  @media(min-width:768px){.wrap{padding:0 32px;}}

  /* Header */
  header.hero{
    border-bottom:1px solid var(--line);
    background:linear-gradient(135deg, var(--teal) 0%, #133E37 100%);
  }
  .hero-inner{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    flex-wrap:wrap;padding:24px 0;
  }
  .hero-left{display:flex;align-items:center;gap:16px;}
  .hero-icon{
    width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.12);flex-shrink:0;
  }
  .hero-title{color:#fff;font-weight:800;font-size:18px;margin:0;}
  @media(min-width:768px){.hero-title{font-size:24px;}}
  .hero-sub{color:#D8E4D8;font-size:13px;margin:2px 0 0;}
  .hero-tags{display:flex;gap:8px;flex-wrap:wrap;}
  .hero-tag{
    font-size:11px;padding:6px 12px;border-radius:999px;
    background:rgba(255,255,255,0.1);color:#EDE7D5;border:1px solid rgba(201,162,39,0.4);
  }

  main{padding:24px 0;display:flex;flex-direction:column;gap:24px;}

  /* Panel */
  .panel{
    border-radius:16px;background:var(--panel);border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(0,0,0,0.04);padding:20px;
  }
  @media(min-width:768px){.panel{padding:24px;}}
  .panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
  .panel-title-row{display:flex;align-items:center;gap:8px;}
  .panel-title{font-weight:700;font-size:16px;color:var(--ink);margin:0;}
  @media(min-width:768px){.panel-title{font-size:18px;}}
  .panel-sub{font-size:13px;color:var(--ink-soft);margin:4px 0 0;}
  .icon{display:inline-flex;flex-shrink:0;}
  .icon svg{display:block;}

  /* Filter bar */
  .filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
  .filter-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--teal);}
  .search-box{position:relative;display:flex;align-items:center;}
  .search-box svg{position:absolute;right:12px;color:var(--ink-soft);pointer-events:none;}
  .search-box input{
    font-size:14px;border-radius:12px;border:1px solid var(--line);
    padding:8px 12px 8px 36px;outline:none;width:180px;font-family:inherit;
    background:#fff;color:var(--ink);
  }
  .search-box input:focus{border-color:var(--teal);}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);
    background:#fff;color:var(--ink-soft);cursor:pointer;transition:all .15s;font-family:inherit;
  }
  .chip:hover{border-color:var(--teal-soft);}
  .chip.active{border-color:var(--teal);background:var(--teal);color:#fff;}
  .chip-clear{font-size:12px;padding:4px 10px;border-radius:999px;border:none;background:transparent;color:var(--bad);cursor:pointer;font-family:inherit;}

  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media(min-width:768px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:1024px){.kpi-grid{grid-template-columns:repeat(6,1fr);}}
  .kpi-card{
    border-radius:16px;background:#fff;border:1px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,0.04);
    padding:16px;display:flex;flex-direction:column;gap:8px;min-width:0;
  }
  .kpi-top{display:flex;align-items:center;justify-content:space-between;}
  .kpi-icon-box{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .kpi-dot{width:10px;height:10px;border-radius:999px;flex-shrink:0;}
  .kpi-value{font-size:20px;font-weight:800;color:var(--ink);}
  @media(min-width:768px){.kpi-value{font-size:24px;}}
  .kpi-label{font-size:12px;font-weight:500;color:var(--ink-soft);}
  .kpi-sub{font-size:11px;}

  /* Grid layouts */
  .grid-5{display:grid;grid-template-columns:1fr;gap:24px;}
  @media(min-width:1024px){.grid-5{grid-template-columns:repeat(5,1fr);}}
  .col-span-3{grid-column:span 1;}
  .col-span-2{grid-column:span 1;}
  @media(min-width:1024px){
    .col-span-3{grid-column:span 3;}
    .col-span-2{grid-column:span 2;}
  }

  select{
    font-size:12px;border:1px solid var(--line);border-radius:10px;padding:6px 10px;
    font-family:inherit;background:#fff;color:var(--ink);outline:none;cursor:pointer;
  }
  select:focus{border-color:var(--teal);}

  .toggle-btn{
    font-size:12px;padding:6px 12px;border-radius:10px;border:1px solid var(--line);
    background:#fff;color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .toggle-btn.active{border-color:var(--teal);background:var(--teal);color:#fff;}

  .chart-wrap{position:relative;width:100%;}
  .note{font-size:12px;margin-top:8px;color:var(--ink-soft);}

  .forecast-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;text-align:center;}
  .forecast-box{border-radius:12px;background:var(--bg);padding:12px;}
  .forecast-box .label{font-size:12px;color:var(--ink-soft);}
  .forecast-box .value{font-weight:800;font-size:18px;}

  .insights-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:768px){.insights-grid{grid-template-columns:repeat(2,1fr);}}

    return {
      group: g,
      zanan: row.zanan_bavari || 0,
      hamsardar: row.hamsardar_tedad || 0,
      movalid: row.movalid || 0,
      darsadMovalid: row.darsad_movalid || 0,
      cesarean: row.sezarin_darsad || 0,
      natural: row.tabiei_darsad || 0,
    };
  });

  const familyData = [
    { name: "بدون فرزند", value: st.bi_farzand_darsad, count: st.bi_farzand_tedad },
    { name: "تک‌فرزند", value: st.tak_farzand_darsad, count: st.tak_farzand_tedad },
    { name: "دو فرزند", value: st.do_farzand_darsad, count: st.do_farzand_tedad },
    { name: "سه فرزند", value: st.se_farzand_darsad, count: st.se_farzand_tedad },
    { name: "چهار فرزند و بیشتر", value: st.chahar_farzand_darsad, count: st.chahar_farzand_tedad },
  ];

  const monthlyOstan = MONTHS.map((m,i) => {
    const row = ostan.mahane[m] || {};
    return { month: m, short: MONTHS_SHORT[i], entezar: row.movalid_entezar, movalid: row.movalid, tahaghogh: row.darsad_tahaghogh, sezarin: row.sezarin, bardar: row.bardar };
  });

  const pts = districtRealization.filter(d => d.weight != null && d.realization != null);
  const n = pts.length;
  const meanW = pts.reduce((a,p) => a + p.weight, 0) / n;
  const meanR = pts.reduce((a,p) => a + p.realization, 0) / n;
  let cov = 0, varW = 0, varR = 0;
  pts.forEach(p => { cov += (p.weight - meanW) * (p.realization - meanR); varW += Math.pow(p.weight - meanW, 2); varR += Math.pow(p.realization - meanR, 2); });
  const correlation = cov / Math.sqrt(varW * varR);

  return {
    st, mt, cesareanRatio, naturalRatio, infertilityRate, counselingRate, realizationRate,
    totalPop, totalBirths1404, totalBirths1405, totalBirths1406,
    districtRealization, lowest, highest, highestCesarean, highestInfertility,
    ageData, familyData, monthlyOstan, correlation,
  };
}

function computeInsights(D){
  const list = [];
  if(D.lowest) list.push({ iconName:"alertTriangle", color:PALETTE.bad, text:`شهرستان «${stripBandar(D.lowest.name)}» با ${pct(D.lowest.realization)} کمترین نرخ تحقق موالید نسبت به هدف مورد انتظار را در استان دارد و نیازمند توجه اولویت‌دار است.` });
  if(D.highest) list.push({ iconName:"target", color:PALETTE.good, text:`شهرستان «${stripBandar(D.highest.name)}» با ${pct(D.highest.realization)} بالاترین نرخ تحقق موالید را به ثبت رسانده و می‌تواند الگوی موفق برای سایر مناطق باشد.` });
  if(D.highestCesarean) list.push({ iconName:"scissors", color:PALETTE.amber, text:`بالاترین نسبت سزارین به کل زایمان‌ها در «${stripBandar(D.highestCesarean.name)}» با ${pct(D.highestCesarean.cesarean)} ثبت شده که نسبت به میانگین استانی (${pct(D.cesareanRatio)}) قابل بررسی است.` });
  const oldGroup = D.ageData.find(a => a.group === "30-34سال");
  const youngGroup = D.ageData.find(a => a.group === "20-24سال");
  if(oldGroup && youngGroup && oldGroup.darsadMovalid > youngGroup.darsadMovalid){
    list.push({ iconName:"trendingUp", color:PALETTE.blue, text:`سهم موالید گروه سنی ۳۰-۳۴ سال (${pct(oldGroup.darsadMovalid)}) از گروه ۲۰-۲۴ سال (${pct(youngGroup.darsadMovalid)}) بیشتر است؛ نشانه‌ای از تأخیر سن باروری در استان.` });
  }
  list.push({ iconName:"layers", color:PALETTE.teal, text:`سهم زنان همسردار «بدون فرزند» و «تک‌فرزند» در سطح استان مجموعاً ${pct(D.st.bi_farzand_darsad + D.st.tak_farzand_darsad)} است که به‌عنوان شاخص هشدار جمعیتی قابل پایش است.` });
  const corrColor = D.correlation < -0.2 ? PALETTE.bad : D.correlation > 0.2 ? PALETTE.good : PALETTE.inkSoft;
  const corrText = Math.abs(D.correlation) < 0.2 ? "رابطه‌ی معناداری بین جمعیت شهرستان و عملکرد تحقق موالید مشاهده نشد." : (D.correlation > 0 ? "شهرستان‌های پرجمعیت‌تر گرایش به نرخ تحقق بالاتر دارند." : "شهرستان‌های پرجمعیت‌تر گرایش به نرخ تحقق پایین‌تر دارند.");
  list.push({ iconName:"activity", color:corrColor, text:`همبستگی بین وزن جمعیتی شهرستان‌ها و نرخ تحقق موالید برابر ${fmt(D.correlation, 2)} است؛ ${corrText}` });
  return list;
}

/* ===================== TOOLTIP HELPER (shared custom tooltip for Chart.js) ===================== */
function externalTooltipHandler(context){
  const {chart, tooltip} = context;
  let el = chart.canvas.parentNode.querySelector('.tooltip-box');
  if(!el){
    el = document.createElement('div');
    el.className = 'tooltip-box';
    chart.canvas.parentNode.appendChild(el);
  }
  if(tooltip.opacity === 0){ el.style.opacity = 0; return; }

  if(tooltip.body){
    const titleLines = tooltip.title || [];
    const bodyLines = tooltip.body.map(b => b.lines);
    let html = '';
    if(titleLines.length) html += `<div class="tt-label">${titleLines.join(' ')}</div>`;
    tooltip.dataPoints.forEach((dp, i) => {
      const color = dp.dataset.borderColor || dp.dataset.backgroundColor || (Array.isArray(dp.dataset.backgroundColor) ? dp.dataset.backgroundColor[dp.dataIndex] : '#000');
      let valText = dp.formattedValue;
      html += `<div class="tt-row" style="color:${typeof color === 'string' ? color : PALETTE.ink}">${dp.dataset.label ? dp.dataset.label + ': ' : ''}${valText}</div>`;
    });
    el.innerHTML = html;
  }

  const {offsetLeft: posX, offsetTop: posY} = chart.canvas;
  el.style.opacity = 1;
  el.style.left = posX + tooltip.caretX + 'px';
  el.style.top = posY + tooltip.caretY + 'px';
  el.style.transform = 'translate(-50%, -110%)';
}

    type: 'bubble',
    data: {
      datasets: [{
        data: data.map((d,i) => ({ x: d.x, y: d.y, r: 6 + (d.z / maxZ) * 22, label: d.name })),
        backgroundColor: data.map((d,i) => CHART_COLORS[i % CHART_COLORS.length] + 'CC'),
        borderColor: data.map((d,i) => CHART_COLORS[i % CHART_COLORS.length]),
        borderWidth: 1,
      }]

    options: {
      responsive:true, maintainAspectRatio:false,
      scales:{
        x:{ title:{display:true, text:'وزن جمعیتی (٪)', color:PALETTE.inkSoft, font:{size:11}}, grid:{color:PALETTE.line}, ticks:{color:PALETTE.inkSoft, font:{size:11}} },

      },
      plugins:{
        legend:{display:false},
        tooltip:{ enabled:false, external: (ctx)=>{
          const {chart, tooltip} = ctx;
          let el = chart.canvas.parentNode.querySelector('.tooltip-box');
          if(!el){ el = document.createElement('div'); el.className='tooltip-box'; chart.canvas.parentNode.appendChild(el); }
          if(tooltip.opacity===0){ el.style.opacity=0; return; }
          const dp = tooltip.dataPoints && tooltip.dataPoints[0];
          if(dp){
            const raw = dp.raw;
            el.innerHTML = `<div class="tt-label">${raw.label}</div><div class="tt-row">وزن جمعیتی: ${fmt(raw.x,1)}٪</div><div class="tt-row">تحقق: ${fmt(raw.y,1)}٪</div>`;

      }
    }
  });

/* Simple treemap rendering via plain divs (no chartjs plugin dependency needed) */
function drawTreemap(){
  const container = document.getElementById('treemap-container');
  if(!container) return;
  container.innerHTML = '';
  container.style.position = 'relative';
  const data = getTreemapData().slice().sort((a,b) => b.size - a.size);
  const total = data.reduce((a,d) => a + d.size, 0);
  // simple squarified-ish layout: simple row-based packing
  const W = container.clientWidth || 600, H = 300;
  let items = data.map(d => ({...d, area: (d.size/total) * W * H }));
  // basic slice-and-dice treemap algorithm
  function layoutRow(items, x, y, w, h, vertical){
    let total = items.reduce((a,i)=>a+i.area,0);
    let offset = 0;
    items.forEach(it => {
      if(vertical){
        const itemH = h * (it.area/total);
        it.rx = x; it.ry = y + offset; it.rw = w; it.rh = itemH;
        offset += itemH;
      } else {
        const itemW = w * (it.area/total);
        it.rx = x + offset; it.ry = y; it.rw = itemW; it.rh = h;
        offset += itemW;
      }
    });
  }
  // split into rows roughly: just do a single full slice/dice strip layout (simplified squarify)
  function squarify(items, x, y, w, h){
    if(items.length === 0) return;
    if(items.length === 1){ items[0].rx=x; items[0].ry=y; items[0].rw=w; items[0].rh=h; return; }
    const total = items.reduce((a,i)=>a+i.area,0);
    let acc = 0, splitIdx = 1;
    for(let i=0;i<items.length;i++){
      acc += items[i].area;
      if(acc >= total/2){ splitIdx = i+1; break; }
    }
    const groupA = items.slice(0, splitIdx);
    const groupB = items.slice(splitIdx);
    const areaA = groupA.reduce((a,i)=>a+i.area,0);
    const fracA = areaA/total;
    if(w >= h){
      const wA = w*fracA;
      squarify(groupA, x, y, wA, h);
      squarify(groupB, x+wA, y, w-wA, h);
    } else {
      const hA = h*fracA;
      squarify(groupA, x, y, w, hA);
      squarify(groupB, x, y+hA, w, h-hA);
    }
  }
  squarify(items, 0, 0, W, H);
  items.forEach((it, i) => {
    const div = document.createElement('div');
    div.style.position = 'absolute';
    div.style.left = it.rx + 'px';
    div.style.top = it.ry + 'px';
    div.style.width = Math.max(it.rw - 2, 0) + 'px';
    div.style.height = Math.max(it.rh - 2, 0) + 'px';
    div.style.background = CHART_COLORS[i % CHART_COLORS.length];
    div.style.color = '#fff';
    div.style.fontSize = '11px';
    div.style.display = 'flex';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'center';
    div.style.justifyContent = 'center';
    div.style.textAlign = 'center';
    div.style.overflow = 'hidden';
    div.style.padding = '2px';
    div.style.boxSizing = 'border-box';
    div.style.border = '1px solid #fff';
    div.style.cursor = 'default';
    div.title = `${it.name}: ${fmt(it.size)}`;
    if(it.rw > 38 && it.rh > 24){
      div.innerHTML = `<div style="font-weight:700;">${it.name}</div><div style="opacity:.85;">${fmt(it.size)}</div>`;
    }
    container.appendChild(div);
  });
}
/* ===================== MAIN RENDER ===================== */
function renderApp(){
  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = `
    ${renderHeader()}
    <div class="wrap">
      <main>
        <div id="filter-bar-slot">${renderFilterBar()}</div>
        <div id="kpi-bar-slot">${renderKpiBar()}</div>
        <div class="grid-5">${renderBubblePanel()}${renderRankPanel()}</div>
        <div id="trend-slot">${renderTrendPanel()}</div>
        <div class="grid-5">${renderAgePanel()}${renderRadarPanel()}</div>
        <div class="grid-5">${renderPiePanel()}${renderTreemapPanel()}</div>
        <div id="forecast-slot">${renderForecastPanel()}</div>
        ${renderInsightsPanel()}
        ${renderFooterPanel()}
      </main>
    </div>
  `;
  attachEvents();
  drawAllCharts();
}

function drawAllCharts(){
  const filtered = getFilteredDistricts();
  drawBubbleChart();
  drawRankChart(filtered);
  drawTrendChart();
  drawAgeChart();
  drawRadarChart();
  drawPieChart();
  drawForecastChart(filtered);
  drawTreemap();
}

/* ===================== PARTIAL UPDATES (avoid full re-render for perf) ===================== */
function updateFilterDependentCharts(){
  const filtered = getFilteredDistricts();
  drawRankChart(filtered);
  drawForecastChart(filtered);
}

function refreshFilterBar(){
  document.getElementById('filter-bar-slot').innerHTML = renderFilterBar();
  attachFilterBarEvents();
}

function refreshTrendPanel(){
  document.getElementById('trend-slot').innerHTML = renderTrendPanel();
  attachTrendEvents();
  drawTrendChart();
}

/* ===================== EVENTS ===================== */
function attachEvents(){
  attachFilterBarEvents();
  attachTrendEvents();

  const rankSelect = document.getElementById('rank-metric-select');
  if(rankSelect){
    rankSelect.addEventListener('change', (e) => {
      state.rankMetric = e.target.value;
      drawRankChart(getFilteredDistricts());
    });
  }

  const ageSelect = document.getElementById('age-metric-select');
  if(ageSelect){
    ageSelect.addEventListener('change', (e) => {
      state.ageMetric = e.target.value;
      drawAgeChart();
    });
  }

  window.addEventListener('resize', debounce(() => { drawTreemap(); }, 200));
}

function attachFilterBarEvents(){
  const searchInput = document.getElementById('search-input');
  if(searchInput){
    searchInput.addEventListener('input', debounce((e) => {
      state.search = e.target.value;
      updateFilterDependentCharts();
    }, 200));
  }
  document.querySelectorAll('.chip[data-district]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-district');
      const idx = state.selectedDistricts.indexOf(key);
      if(idx >= 0) state.selectedDistricts.splice(idx, 1);
      else state.selectedDistricts.push(key);
      refreshFilterBar();
      updateFilterDependentCharts();
    });
  });
  const clearBtn = document.getElementById('clear-districts');
  if(clearBtn){
    clearBtn.addEventListener('click', () => {
      state.selectedDistricts = [];
      refreshFilterBar();
      updateFilterDependentCharts();
    });
  }
}

function attachTrendEvents(){
  const trendSelect = document.getElementById('trend-district-select');
  if(trendSelect){
    trendSelect.addEventListener('change', (e) => {
      state.trendDistrict = e.target.value;
      refreshTrendPanel();
    });
  }
  const compareBtn = document.getElementById('compare-avg-btn');
  if(compareBtn){
    compareBtn.addEventListener('click', () => {
      state.compareAvg = !state.compareAvg;
      refreshTrendPanel();
    });
  }
}

function debounce(fn, ms){
  let t;
  return function(...args){ clearTimeout(t); t = setTimeout(() => fn.apply(this,args), ms); };
}

/* ===================== INIT ===================== */
function init(){
  const raw = document.getElementById('raw-data').textContent;
  DATA = JSON.parse(raw);
  D = computeDerived(DATA);
  INSIGHTS = computeInsights(D);
  renderApp();
}

document.addEventListener('DOMContentLoaded', init);

</script>
